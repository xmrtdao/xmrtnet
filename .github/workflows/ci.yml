name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install ruff streamlit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f deploy/huggingface-space/requirements.txt ]; then pip install -r deploy/huggingface-space/requirements.txt; fi
      - name: Lint
        run: ruff check src/ app/ deploy/huggingface-space/ || true
      - name: Verify Streamlit app starts
        run: |
          cd deploy/huggingface-space
          timeout 5 streamlit run app.py &
          sleep 3
          curl -f http://localhost:8501/healthz || true
      - name: Verify deploy folder
        run: |
          test -f deploy/huggingface-space/app.py
          test -f deploy/huggingface-space/requirements.txt
