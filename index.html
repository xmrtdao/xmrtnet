<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMRTnet — XMRT DAO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060a;
      --fg: #e8e8f0;
      --accent: #3b82f6;
      --card: #0f0f18;
      --border: #1a1a2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Rajdhani', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.02) 0%, transparent 50%),
        var(--bg);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: -50%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 0;
    }
    .hero > * { position: relative; z-index: 1; }
    .badge {
      font-family: 'Orbitron', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 0.35rem 1rem;
      border-radius: 2rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(2.2rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: clamp(1rem, 2vw, 1.4rem);
      max-width: 600px;
      color: #8a8aa0;
      font-weight: 300;
      margin-bottom: 2.5rem;
    }
    .cta {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 1rem 2.5rem;
      border-radius: 0.4rem;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      background: var(--accent);
      color: #000;
      border: none;
    }
    .cta:hover { opacity: 0.85; transform: translateY(-2px); }
    footer {
      padding: 2.5rem;
      text-align: center;
      border-top: 1px solid var(--border);
      font-size: 0.8rem;
      color: #555;
      margin-top: auto;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="badge">XMRT DAO Product</div>
    <h1>XMRTnet</h1>
    <div class="subtitle">Multi-chain analytics dashboard: ETH, Polygon, BSC, Avalanche, Arbitrum, Optimism</div>
    <a href="https://github.com/xmrtdao/xmrtnet" class="cta">View Source on GitHub</a>
  </section>
  <footer>
    Built by <a href="https://github.com/xmrtdao">XMRT DAO</a> &middot;
    <a href="https://relay.mobilemonero.com">Fleet Dashboard</a> &middot;
    <a href="https://github.com/xmrtdao/xmrt-stick">XMRT Stick</a>
  </footer>
</body>
</html>
